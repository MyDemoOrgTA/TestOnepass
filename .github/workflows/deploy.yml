name: Deploy (load-secrets-action)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Step 1: Authenticate to 1Password — no op:// URIs here
      - name: Load Secrets from 1Password
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        with:
          export-env: true

      # ✅ Step 2: Declare op:// URIs here — resolved + auto-masked by action above
      - name: Deploy
        env:
          DB_PASSWORD: op://Test/DB_PASS/password
          DB_USERNAME: op://Test/DB_PASS/username
        run: |
          echo "DB_USERNAME length: ${#DB_USERNAME}"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"
          # ./scripts/deploy.sh   ← uncomment for real use
